services:
  # Export host system metrics (CPU, RAM, disk, network)
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    pid: host
    command:
      - '--path.rootfs=/host'
    volumes:
      - /:/host:ro,rslave
    networks:
      - internal_metrics
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:9100/']
      interval: 5s
      timeout: 1s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # Export Docker container metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - internal_metrics
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8080/healthz']
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Unified collection agent: scrapes metrics and ships logs to Grafana Cloud
  alloy:
    image: grafana/alloy:v1.4.2
    container_name: alloy
    volumes:
      - ./alloy-config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
    env_file:
      - .env
    networks:
      - internal_metrics
    depends_on:
      - node-exporter
      - cadvisor
    healthcheck:
      # alloy image has no wget/curl/nc; uses bash's /dev/tcp to check port 12345
      # (alloy's built-in UI/API port), which is the only available TCP check method.
      test: ['CMD', 'bash', '-c', 'exec 3<>/dev/tcp/127.0.0.1/12345']
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 15s
    restart: unless-stopped

networks:
  internal_metrics:
    external: true
