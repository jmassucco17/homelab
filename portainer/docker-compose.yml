services:
  portainer:
    image: portainer/portainer-ce:2.33.7
    container_name: portainer
    command:
      - --http-enabled
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.portainer.rule=Host(`portainer.jamesmassucco.com`)'
      - 'traefik.http.routers.portainer.entrypoints=websecure'
      - 'traefik.http.routers.portainer.tls=true'
      - 'traefik.http.routers.portainer.tls.certresolver=cloudflare'
      - 'traefik.http.routers.portainer.middlewares=oauth-auth,ratelimit'
      - 'traefik.http.services.portainer.loadbalancer.server.port=9000'
    networks:
      - web
    healthcheck:
      # portainer image is minimal (no wget/curl/shell); --version exits 0 quickly,
      # confirming the binary is functional. The HTTP /api/system/status endpoint
      # cannot be reached from within the container without HTTP client tools.
      test: ['CMD', '/portainer', '--version']
      interval: 5s
      timeout: 1s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  portainer_data:

networks:
  web:
    external: true
